<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speech Mech | Core Settings</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="premium-container" style="background-image: linear-gradient(rgba(10, 11, 30, 0.9), rgba(10, 11, 30, 0.9)), url('/static/img/dash_bg.png');">
        
        <nav style="position: absolute; top: 2rem; width: 100%; display: flex; justify-content: space-between; padding: 0 4rem; box-sizing: border-box;">
            <div style="display: flex; align-items: center; gap: 1rem; cursor: pointer;" onclick="location.href='/dashboard'">
                <i class="fas fa-chevron-left" style="color: var(--secondary);"></i>
                <h2 style="margin: 0; font-weight: 700;">Speech Mech Settings</h2>
            </div>
            <div style="display: flex; align-items: center; gap: 1.5rem;">
                <span style="color: var(--secondary);">Identity: <strong>{{ user }}</strong></span>
            </div>
        </nav>

        <div class="glass-card" style="max-width: 600px; padding: 3rem;">
            <h2 style="margin-bottom: 2rem; border-bottom: 2px solid var(--primary); display: inline-block;">Update Credentials</h2>
            
            <div class="input-group">
                <label>New Neural Access String (Password)</label>
                <input type="password" id="new-password" placeholder="New string">
                <button class="btn" style="margin-top: 1rem;" onclick="updatePassword()">Update Password</button>
            </div>

            <hr style="border: 0; border-top: 1px solid var(--glass-border); margin: 3rem 0;">

            <h2 style="margin-bottom: 1.5rem; border-bottom: 2px solid var(--primary); display: inline-block;">Biometric Management</h2>
            <div id="camera-area" style="display: none; margin-bottom: 1.5rem;">
                <div style="border: 2px solid var(--primary); border-radius: 16px; overflow: hidden; height: 200px; background: black; position: relative;">
                    <video id="web-camera" autoplay playsinline style="width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1);"></video>
                    <canvas id="capture-canvas" style="display: none;"></canvas>
                    <div id="camera-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.4); color: white; font-weight: bold; text-align: center; padding: 1rem;">
                        Initializing...
                    </div>
                </div>
            </div>
            <button class="btn btn-secondary" style="width: 100%;" onclick="startBiometricReupload()">
                <i class="fas fa-camera"></i> Re-scan Bio-Signature
            </button>
            
            <p id="status-msg" style="margin-top: 2rem; text-align: center; font-size: 0.9rem;"></p>
        </div>
    </div>

    <!-- Global Voice Button -->
    <div class="voice-trigger" id="voiceBtn" onclick="toggleMicPower()">
        <svg class="mic-svg" viewBox="0 0 24 24">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
    </div>

    <script>
        let micPowered = false;
        let recognition = null;
        let isSpeaking = false;

        function speak(text) {
            if (!text) return;
            const msg = new SpeechSynthesisUtterance(text);
            msg.onstart = () => {
                isSpeaking = true;
                if (recognition) try { recognition.stop(); } catch(e) {}
            };
            msg.onend = () => {
                isSpeaking = false;
                if (micPowered) {
                    setTimeout(() => {
                        if (micPowered && !isSpeaking) {
                            try { recognition.start(); } catch(e) {}
                        }
                    }, 300);
                }
            };
            window.speechSynthesis.speak(msg);
        }

        function toggleMicPower() {
            const btn = document.getElementById('voiceBtn');
            micPowered = !micPowered;
            if (micPowered) {
                btn.style.background = "linear-gradient(135deg, #00f2fe, #4facfe)";
                startContinuousListening();
            } else {
                btn.style.background = "linear-gradient(135deg, #f093fb, #f5576c)";
                if (recognition) try { recognition.stop(); } catch(e) {}
            }
        }

        function startContinuousListening() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return;
            recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.continuous = false;

            recognition.onstart = () => document.getElementById('voiceBtn').classList.add('active');
            recognition.onresult = async (event) => {
                if (isSpeaking) return;
                const command = event.results[0][0].transcript.toLowerCase();
                if (command.includes("go back") || command.includes("dashboard")) {
                    window.location.href = '/dashboard';
                }
            };
            recognition.onend = () => {
                document.getElementById('voiceBtn').classList.remove('active');
                if (micPowered && !isSpeaking) {
                    setTimeout(() => {
                        if (micPowered && !isSpeaking) {
                            try { recognition.start(); } catch(e) {}
                        }
                    }, 300);
                }
            };
            recognition.start();
        }

        function setStatus(msg, color) {
            const el = document.getElementById('status-msg');
            el.innerText = msg;
            el.style.color = color;
        }

        async function updatePassword() {
            const password = document.getElementById('new-password').value;
            if(!password) return alert("String cannot be empty");
            const res = await fetch('/update_profile', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ password })
            });
            const data = await res.json();
            if(data.success) {
                setStatus(data.message, "var(--primary)");
                document.getElementById('new-password').value = "";
            }
        }

        let videoStream = null;

        async function startWebCamera() {
            const video = document.getElementById('web-camera');
            try {
                videoStream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                video.srcObject = videoStream;
            } catch (err) {
                console.error("Camera access denied:", err);
                setStatus("Camera access denied.", "red");
            }
        }

        function stopWebCamera() {
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
            }
            const video = document.getElementById('web-camera');
            if (video) video.srcObject = null;
        }

        function captureFrame() {
            const video = document.getElementById('web-camera');
            const canvas = document.getElementById('capture-canvas');
            if (!video || !canvas) return null;
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1); // Flip back to normal for server processing
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            return canvas.toDataURL('image/jpeg', 0.8);
        }

        async function startBiometricReupload() {
            document.getElementById('camera-area').style.display = 'block';
            await startWebCamera();
            
            const overlay = document.getElementById('camera-overlay');
            let epochsNeeded = 3;
            let currentEpoch = 0;

            async function registerStep() {
                if (currentEpoch >= epochsNeeded) {
                    overlay.innerText = "Signature Re-uploaded.";
                    setStatus("Biometric data updated successfully.", "var(--primary)");
                    stopWebCamera();
                    setTimeout(() => {
                         document.getElementById('camera-area').style.display = 'none';
                    }, 2000);
                    return;
                }

                overlay.innerText = `Analyzing Face (${currentEpoch + 1}/3)...`;
                
                setTimeout(async () => {
                    const frame = captureFrame();
                    if (!frame) {
                        setStatus("Failed to capture frame.", "red");
                        return;
                    }

                    overlay.innerText = "Capturing Neural Map...";
                    const res = await fetch('/register_face_direct', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ frame: frame })
                    });
                    const data = await res.json();
                    
                    if (data.success) {
                        currentEpoch++;
                        if (data.done) {
                            currentEpoch = 3; // Finished
                        }
                        registerStep();
                    } else {
                        setStatus(data.message, "red");
                        overlay.innerText = "Retry Scan...";
                        setTimeout(registerStep, 2000);
                    }
                }, 3000);
            }

            registerStep();
        }
    </script>
</body>
</html>
