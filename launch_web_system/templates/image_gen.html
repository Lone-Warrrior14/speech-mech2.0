<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPEECH-MECH | Visualizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg-dark: #0a0b1e;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #e0e0e0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text);
            overflow: hidden;
        }

        .image-gen-container { 
            display: flex; 
            height: 100vh; 
        }

        .sidebar {
            width: 300px;
            background: rgba(0, 0, 0, 0.4);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
        }

        .main-content { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            padding: 3rem;
            position: relative;
            background: radial-gradient(circle at center, rgba(0, 242, 254, 0.05) 0%, transparent 70%);
        }

        .preview-area {
            width: 100%;
            max-width: 550px;
            aspect-ratio: 1/1;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            margin-bottom: 2.5rem;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            transition: transform 0.3s ease;
        }

        .preview-area:hover {
            transform: scale(1.02);
        }

        .preview-area img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: none;
            animation: fadeIn 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .preview-area .placeholder {
            color: rgba(255, 255, 255, 0.1);
            font-size: 5rem;
        }

        .input-bar {
            width: 100%;
            max-width: 700px;
            display: flex;
            gap: 1rem;
            background: var(--glass);
            padding: 0.8rem;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
        }

        .input-bar input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.8rem 1.2rem;
            color: white;
            font-size: 1.1rem;
            outline: none;
        }

        .btn {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: 600;
            padding: 0 2rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 242, 254, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 0.8rem 1.5rem;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .loader {
            border: 4px solid rgba(255,255,255,0.05);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .voice-trigger {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        .voice-trigger.active {
            filter: hue-rotate(90deg);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        
        .mic-svg { width: 28px; height: 28px; fill: white; }

        .history-list { overflow-y: auto; flex: 1; margin-top: 1rem; }
        .history-item {
            padding: 1rem;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.03);
            margin-bottom: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }
        .history-item:hover { background: rgba(255, 255, 255, 0.07); border-color: var(--glass-border); }
        .history-item p { margin: 0; font-size: 0.85rem; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .error-toast {
            position: fixed;
            top: 2rem;
            right: 2rem;
            background: rgba(244, 63, 94, 0.15);
            border: 1px solid rgba(244, 63, 94, 0.3);
            color: #fb7185;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            display: none;
            animation: slideIn 0.3s ease-out;
            z-index: 2000;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

    </style>
</head>
<body>
    <div class="image-gen-container">
        <aside class="sidebar">
            <div style="display: flex; align-items: center; gap: 0.8rem; margin-bottom: 2.5rem; cursor: pointer;" onclick="location.href='/dashboard'">
                <i class="fas fa-arrow-left" style="color: var(--secondary);"></i>
                <h2 style="margin: 0; font-size: 1.2rem; letter-spacing: 1px;">NEURAL VISUALS</h2>
            </div>
            
            <h4 style="color: var(--secondary); font-size: 0.75rem; text-transform: uppercase; margin-bottom: 1rem; opacity: 0.7;">Neural History</h4>
            <div class="history-list" id="history-list"></div>
        </aside>

        <main class="main-content">
            <div class="preview-area" id="preview-container">
                <i class="fas fa-wand-magic-sparkles placeholder" id="placeholder-icon"></i>
                <img id="result-img" src="" alt="Generated Visual">
                <div class="loader" id="loader"></div>
            </div>

            <div class="input-bar">
                <input type="text" id="prompt-input" placeholder="Enter neural command to manifest..." onkeypress="if(event.key==='Enter') generateImage()">
                <button class="btn" onclick="generateImage()">
                    <i class="fas fa-bolt"></i> Manifest
                </button>
            </div>

            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <button class="btn btn-secondary" onclick="downloadImage()">
                    <i class="fas fa-file-download"></i> Extract
                </button>
                <button class="btn btn-secondary" onclick="clearCanvas()">
                    <i class="fas fa-trash-alt"></i> Purge
                </button>
            </div>
        </main>
    </div>

    <div class="error-toast" id="error-toast"></div>

    <div class="voice-trigger" id="voiceBtn" onclick="toggleMicPower()">
        <svg class="mic-svg" viewBox="0 0 24 24">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
    </div>

    <script>
        let micPowered = false;
        let recognition = null;
        let isSpeaking = false;
        let currentImageURL = "";

        function showUIError(msg) {
            const toast = document.getElementById('error-toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 5000);
        }

        async function generateImage(textOverride = null) {
            const input = document.getElementById('prompt-input');
            const prompt = (textOverride || input.value).trim();
            const img = document.getElementById('result-img');
            const loader = document.getElementById('loader');
            const icon = document.getElementById('placeholder-icon');

            if (!prompt) return;
            
            input.value = prompt;
            loader.style.display = "block";
            img.style.display = "none";
            icon.style.display = "none";

            try {
                const res = await fetch("/api/generate-image", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt })
                });

                if (!res.ok) {
                    const data = await res.json();
                    throw new Error(data.error || "Generation mismatch.");
                }

                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                
                currentImageURL = url;
                img.src = url;
                img.style.display = "block";
                
                addToHistory(prompt, url);
                speak("Visual manifestation complete.");

            } catch (err) {
                console.error(err);
                icon.style.display = "block";
                showUIError(err.message);
                speak("Error during manifestation.");
            } finally {
                loader.style.display = "none";
            }
        }

        function addToHistory(prompt, url) {
            const list = document.getElementById('history-list');
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `<p>${prompt}</p>`;
            item.onclick = () => {
                document.getElementById('result-img').src = url;
                document.getElementById('result-img').style.display = "block";
                document.getElementById('placeholder-icon').style.display = "none";
                document.getElementById('prompt-input').value = prompt;
                currentImageURL = url;
            };
            list.prepend(item);
        }

        function downloadImage() {
            if (!currentImageURL) return;
            const a = document.createElement("a");
            a.href = currentImageURL;
            a.download = `neural-visual-${Date.now()}.png`;
            a.click();
        }

        function clearCanvas() {
            document.getElementById('result-img').style.display = "none";
            document.getElementById('placeholder-icon').style.display = "block";
            document.getElementById('prompt-input').value = "";
            currentImageURL = "";
        }

        function speak(text) {
            if (!text) return;
            window.speechSynthesis.cancel();
            
            // Stop listening immediately
            if (micPowered && recognition) {
                try { recognition.stop(); } catch(e) {}
            }

            const msg = new SpeechSynthesisUtterance(text);
            msg.onstart = () => { isSpeaking = true; };
            msg.onend = () => {
                isSpeaking = false;
                if (micPowered) {
                    setTimeout(() => {
                        if (micPowered && !isSpeaking) {
                            try { recognition.start(); } catch(e) {}
                        }
                    }, 300);
                }
            };
            window.speechSynthesis.speak(msg);
        }

        function toggleMicPower() {
            const btn = document.getElementById('voiceBtn');
            micPowered = !micPowered;
            if (micPowered) {
                btn.classList.add('active');
                startContinuousListening();
            } else {
                btn.classList.remove('active');
                if (recognition) recognition.stop();
            }
        }

        function startContinuousListening() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return;
            recognition = new SpeechRecognition();
            recognition.onresult = (event) => {
                if (isSpeaking) return;
                handleVoiceCommand(event.results[0][0].transcript);
            };
            recognition.onend = () => { if (micPowered && !isSpeaking) setTimeout(() => { try { recognition.start(); } catch(e) {} }, 300); };
            if (!isSpeaking) {
                try { recognition.start(); } catch(e) {}
            }
        }

        function handleVoiceCommand(command) {
            const low = command.toLowerCase();
            if (low.includes("go back") || low.includes("dashboard")) {
                location.href = '/dashboard';
            } else if (low.includes("logout") || low.includes("sign out")) {
                location.href = '/logout';
            } else if (low.includes("setting") || low.includes("profile") || low.includes("password") || low.includes("face")) {
                location.href = '/settings';
            } else if (low.includes("generate") || low.includes("manifest") || low.includes("create")) {
                let prompt = low.replace(/generate|manifest|create|image|an|visual/g, "").trim();
                generateImage(prompt);
            } else if (low.includes("clear") || low.includes("purge") || low.includes("delete")) {
                clearCanvas();
                speak("Purged.");
            } else if (low.includes("download") || low.includes("extract")) {
                downloadImage();
                speak("Extracting visual.");
            }
        }

        window.onload = () => {
            // Initiate voice synchronization immediately
            setTimeout(toggleMicPower, 1000);
            
            // Auto prompt if present
            const params = new URLSearchParams(window.location.search);
            if (params.has('auto_prompt')) {
                generateImage(params.get('auto_prompt'));
            }
        };

        // 🛰️ Neural Override: Space key to stop speaking and start mic
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
                e.preventDefault(); 
                window.speechSynthesis.cancel();
                isSpeaking = false;
                
                if (!micPowered) {
                    toggleMicPower();
                } else if (recognition) {
                    try { recognition.stop(); } catch(err) {}
                }
            }
        });
    </script>
</body>
</html>
