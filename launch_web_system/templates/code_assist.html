<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPEECH-MECH | Omni Coder</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .code-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: var(--bg-dark);
        }
        #chat-messages {
            width: 100%;
            max-width: 1200px;
            flex: 1;
            margin: 0 auto;
            padding: 2rem;
            overflow-y: auto;
        }
        .chat-input-area {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto 2rem auto;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 0.5rem;
            display: flex;
            gap: 0.5rem;
        }
        .chat-input-area input {
            border: none;
            background: transparent;
            font-size: 1.1rem;
        }
        .chat-input-area input:focus {
            box-shadow: none;
        }
        .file-list {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }
        .file-badge {
            background: rgba(0, 242, 254, 0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 0.3rem 0.8rem;
            border-radius: 8px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .code-block {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 1.5rem;
            border-radius: 12px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9rem;
            margin-top: 1rem;
            overflow-x: auto;
            border: 1px solid var(--glass-border);
            position: relative;
        }
        .copy-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .ai-status {
            font-size: 0.8rem;
            color: var(--secondary);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .active-mic {
            animation: pulse-mic 1.5s infinite;
        }

        @keyframes pulse-mic {
            0% { box-shadow: 0 0 0 0 rgba(79, 172, 254, 0.4); transform: scale(1); }
            70% { box-shadow: 0 0 0 15px rgba(79, 172, 254, 0); transform: scale(1.05); }
            100% { box-shadow: 0 0 0 0 rgba(79, 172, 254, 0); transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="code-container">
        <header style="width: 100%; padding: 1rem 3rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); box-sizing: border-box; backdrop-filter: blur(10px);">
            <div style="display: flex; align-items: center; gap: 1rem; cursor: pointer;" onclick="location.href='/dashboard'">
                <i class="fas fa-chevron-left" style="color: var(--secondary);"></i>
                <h2 style="margin: 0; font-family: 'Space Grotesk', sans-serif; font-size: 1.3rem; letter-spacing: -0.5px;">OMNI CODER</h2>
            </div>
            <div style="display: flex; gap: 1rem;">
                <button class="btn btn-secondary" style="width: auto; padding: 0.5rem 1rem; margin: 0; font-size: 0.8rem;" onclick="location.href='/download_coder_project'">
                    <i class="fas fa-download"></i> Download Project
                </button>
            </div>
        </header>

        <div class="chat-messages" id="chat-messages">
            <div class="message ai">
                <div class="ai-status">Neural Uplink Active</div>
                Omni Coder is online. Ready for complex logic synthesis or code debugging. How can I assist?
            </div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Describe a feature, paste code to fix, or ask for a solution..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="btn" style="width: 60px; margin: 0; padding: 0;" onclick="sendMessage()">
                <i class="fas fa-bolt"></i>
            </button>
        </div>
    </div>

    <!-- Global Voice Button -->
    <div class="voice-trigger" id="voiceBtn" onclick="toggleVoice()">
        <svg class="mic-svg" viewBox="0 0 24 24">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
    </div>

    <script>
        let micPowered = false;
        let recognition = null;
        let isSpeaking = false;

        function speak(text) {
            if (!text) return;
            window.speechSynthesis.cancel();
            if (micPowered && recognition) try { recognition.stop(); } catch(e) {}
            const cleanText = text.replace(/[*_`#]/g, '');
            const msg = new SpeechSynthesisUtterance(cleanText);
            msg.onstart = () => { isSpeaking = true; };
            msg.onend = () => { isSpeaking = false; if (micPowered) setTimeout(() => { if (micPowered && !isSpeaking) try { recognition.start(); } catch(e) {} }, 400); };
            window.speechSynthesis.speak(msg);
        }

        async function sendMessage(textOverride = null) {
            const input = document.getElementById('user-input');
            const text = textOverride || input.value.trim();
            if (!text) return;
            appendMessage('user', text);
            input.value = '';
            const response = await fetch('/api/ask_coder', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: text })
            });
            const data = await response.json();
            appendAICoderMessage(data);
            speak(data.answer);
        }

        function appendMessage(role, text) {
            const chat = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerText = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function appendAICoderMessage(data) {
            const chat = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = 'message ai';
            let html = `<div class="ai-status">Neural Synthesis Result</div>`;
            html += `<div style="white-space: pre-wrap;">${data.answer}</div>`;
            if (data.files && data.files.length > 0) {
                html += `<div class="file-list">`;
                data.files.forEach(file => { html += `<div class="file-badge"><i class="fas fa-file-code"></i> ${file[0]}</div>`; });
                html += `</div>`;
                data.files.forEach(file => {
                    html += `<div class="code-block">
                        <div style="color: var(--secondary); font-size: 0.7rem; margin-bottom: 0.5rem;">${file[0]}</div>
                        <button class="copy-btn" onclick="copyToClipboard(this, \`${file[1].replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`)">Copy</button>
                        <pre><code>${escapeHtml(file[1])}</code></pre>
                    </div>`;
                });
            }
            div.innerHTML = html;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        function copyToClipboard(btn, text) { navigator.clipboard.writeText(text); const originalText = btn.innerText; btn.innerText = 'Copied!'; setTimeout(() => btn.innerText = originalText, 2000); }

        function toggleVoice() {
            const btn = document.getElementById('voiceBtn');
            micPowered = !micPowered;
            if (micPowered) {
                btn.style.background = "linear-gradient(135deg, #00f2fe, #4facfe)";
                btn.classList.add('active-mic');
                startContinuousListening();
            } else {
                btn.style.background = "linear-gradient(135deg, #f093fb, #f5576c)";
                btn.classList.remove('active-mic');
                if (recognition) try { recognition.stop(); } catch(e) {}
            }
        }

        function startContinuousListening() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return;
            recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.continuous = false;
            recognition.onresult = async (event) => {
                if (isSpeaking) return;
                const command = event.results[event.results.length - 1][0].transcript;
                const low = command.toLowerCase();
                if (low.includes("go back") || low.includes("dashboard")) {
                    window.location.href = '/dashboard';
                } else if (low.includes("logout") || low.includes("sign out")) {
                    location.href = '/logout';
                } else {
                    document.getElementById('user-input').value = command;
                    sendMessage(command);
                }
            };
            recognition.onend = () => { if (micPowered && !isSpeaking) setTimeout(() => { if (micPowered && !isSpeaking) try { recognition.start(); } catch(e) {} }, 300); };
            if (!isSpeaking) try { recognition.start(); } catch(e) {}
        }

        window.onload = () => {
            micPowered = true;
            const btn = document.getElementById('voiceBtn');
            btn.style.background = "linear-gradient(135deg, #00f2fe, #4facfe)";
            btn.classList.add('active-mic');
            startContinuousListening();
            setTimeout(() => { if (!isSpeaking) speak("Omni Coder synchronized."); }, 1000);
        };

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
                e.preventDefault(); 
                window.speechSynthesis.cancel();
                isSpeaking = false;
                if (!micPowered) toggleVoice();
                else if (recognition) try { recognition.stop(); } catch(err) {}
            }
        });
    </script>
</body>
</html>
