<style>

<body class="bg-background text-on-background font-body selection:bg-primary-container selection:text-on-primary-container overflow-hidden min-h-screen flex items-center justify-center">
<!-- Abstract Neural Background -->
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,_rgba(255,180,170,0.05),_transparent_70%)]"></div>

<!-- Main Authentication Shell -->
<main class="relative z-10 w-full max-w-md px-6">
<!-- Brand Anchor -->
<div class="mb-12 text-center">
<h1 class="font-headline text-4xl font-bold tracking-tighter text-primary">
                SPEECH-MECH
            </h1>
<p class="font-label text-[10px] uppercase tracking-[0.3em] text-on-surface-variant mt-2">
                Quantum Neural Processing Unit
            </p>
</div>
<!-- Glassmorphic Card -->
<div class="obsidian-glass rounded-xl p-8 biometric-glow relative border border-outline-variant/10">
<!-- Contextual Header -->
<div class="mb-10">
<h2 class="font-headline text-2xl font-medium tracking-tight text-on-surface">Secure Access</h2>
<div class="h-[2px] w-8 crimson-gradient mt-2"></div>
</div>
<!-- Primary Auth Actions (Asymmetric Layout) -->
<div class="space-y-6">
<!-- Biometric Entry Point -->
<button class="group relative w-full flex items-center justify-between p-5 bg-surface-container-lowest rounded-lg hover:bg-surface-container-low transition-all duration-500 overflow-hidden">
<div class="flex items-center gap-4">
<div class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container-highest group-hover:scale-110 transition-transform duration-500">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="fingerprint">fingerprint</span>
</div>
<div class="text-left">
<p class="font-headline text-sm font-semibold text-on-surface">Biometric Scan</p>
<p class="font-body text-[11px] text-on-surface-variant">Initialize identity verification</p>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant group-hover:translate-x-1 transition-transform" data-icon="arrow_forward_ios">arrow_forward_ios</span>
<!-- Decorative Left Stripe -->
<div class="absolute left-0 top-0 bottom-0 w-[2px] crimson-gradient opacity-0 group-hover:opacity-100 transition-opacity"></div>
</button>
<!-- Voice Entry Point -->
<button class="group relative w-full flex items-center justify-between p-5 bg-surface-container-lowest rounded-lg hover:bg-surface-container-low transition-all duration-500 overflow-hidden">
<div class="flex items-center gap-4">
<div class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container-highest group-hover:scale-110 transition-transform duration-500">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="mic_external_on">mic_external_on</span>
</div>
<div class="text-left">
<p class="font-headline text-sm font-semibold text-on-surface">Voice Authentication</p>
<p class="font-body text-[11px] text-on-surface-variant">Analyze vocal waveform signature</p>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant group-hover:translate-x-1 transition-transform" data-icon="arrow_forward_ios">arrow_forward_ios</span>
<!-- Decorative Left Stripe -->
<div class="absolute left-0 top-0 bottom-0 w-[2px] crimson-gradient opacity-0 group-hover:opacity-100 transition-opacity"></div>
</button>
</div>
<!-- Secondary Input Field (Recessed Look) -->
<div class="mt-10 pt-10 border-t border-outline-variant/10">
<div class="space-y-4">
<div class="relative">
<input class="w-full bg-surface-container-lowest border-none focus:ring-1 focus:ring-primary/30 rounded-lg py-3 px-4 text-sm font-body text-on-surface placeholder:text-on-surface-variant/40 transition-all" placeholder="Access Code" type="text"/>
<div class="absolute right-3 top-1/2 -translate-y-1/2">
<span class="material-symbols-outlined text-on-surface-variant text-lg" data-icon="key">key</span>
</div>
</div>
<button class="w-full crimson-gradient text-on-primary py-4 text-xs font-headline font-bold uppercase tracking-widest rounded-lg hover:shadow-[0_0_20px_rgba(255,85,69,0.3)] active:scale-95 transition-all duration-300">
                        Authorize Terminal
                    </button>
</div>
</div>

<div class="mt-8 flex justify-between items-center px-1">
<span class="font-label text-[9px] text-on-surface-variant/50 tracking-tighter">NODE: OBSIDIAN-01</span>
<span class="font-label text-[9px] text-tertiary uppercase tracking-widest">Quantum Shield Active</span>
</div>
</div>

<a class="font-label text-[10px] text-on-surface-variant hover:text-primary transition-colors tracking-widest uppercase" href="#">Emergency Access</a>
<a class="font-label text-[10px] text-on-surface-variant hover:text-primary transition-colors tracking-widest uppercase" href="#">System Logs</a>
</div>
</main>
<!-- Bottom Status Bar (Non-Nav) -->
<footer class="fixed bottom-0 w-full p-6 flex justify-between items-end z-10 pointer-events-none">
<div class="opacity-30">
<p class="font-headline text-[8px] tracking-widest text-on-surface-variant leading-none">CORE TEMPERATURE</p>
<p class="font-headline text-lg font-bold text-primary">32.4°C</p>
</div>
<div class="text-right opacity-30">
<p class="font-headline text-[8px] tracking-widest text-on-surface-variant leading-none">NEURAL LATENCY</p>
<p class="font-headline text-lg font-bold text-tertiary">0.02ms</p>
