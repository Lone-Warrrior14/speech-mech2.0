<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Box | Premium Streaming</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #8b5cf6;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px;
            overflow-x: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
            position: relative;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .admin-badge {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .upload-btn {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 24px;
            transition: all 0.4s ease;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(225deg, transparent, rgba(99, 102, 241, 0.1));
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .card:hover {
            transform: scale(1.03);
            border-color: var(--primary);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-icon {
            width: 48px;
            height: 48px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 1.5rem;
        }

        .card-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Player Modal Styles */
        #playerOverlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 40px;
            animation: fadeIn 0.3s ease;
        }

        .player-container {
            width: 100%;
            max-width: 1000px;
            position: relative;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass-border);
        }

        video {
            width: 100%;
            display: block;
        }

        .player-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 30px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .close-btn {
            background: var(--glass);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .close-btn:hover {
            background: rgba(239, 68, 68, 0.5);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 100px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <header class="header">
        <div>
            <h1>Media Box</h1>
            <p style="color: var(--text-muted); margin-top: 5px;">Stream your collection from the cloud</p>
        </div>
        
        <div style="display: flex; align-items: center; gap: 20px;">
            {% if role == 'admin' %}
            <span class="admin-badge">Admin Access</span>
            <button class="upload-btn" onclick="uploadMedia()">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
                </svg>
                Upload Movie
            </button>
            {% endif %}
        </div>
    </header>

    <div class="grid">
        {% if not movies %}
        <div class="empty-state">
            <p>No movies found in your cloud library.</p>
        </div>
        {% endif %}

        {% for movie in movies %}
        <div class="card" onclick="playMovie('{{movie.url}}','{{movie.name}}')">
            <div class="card-icon">
                <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
            <div class="card-name" title="{{movie.name}}">{{ movie.name }}</div>
            <div class="card-meta">Cloud Storage • MP4</div>
        </div>
        {% endfor %}
    </div>

    <div id="playerOverlay">
        <div class="player-container">
            <div class="player-header">
                <h3 id="playerTitle" style="font-weight: 600;"></h3>
                <button class="close-btn" onclick="closePlayer()">&times;</button>
            </div>
            <video id="videoPlayer" controls>
                <source id="videoSource">
                Your browser does not support the video tag.
            </video>
        </div>
    </div>

    <script>
        function playMovie(url, name) {
            const overlay = document.getElementById("playerOverlay");
            const player = document.getElementById("videoPlayer");
            const source = document.getElementById("videoSource");
            const title = document.getElementById("playerTitle");

            title.innerText = name;
            source.src = url;
            
            overlay.style.display = "flex";
            player.load();
            player.play();
        }

        function closePlayer() {
            const overlay = document.getElementById("playerOverlay");
            const player = document.getElementById("videoPlayer");
            
            player.pause();
            player.src = "";
            overlay.style.display = "none";
        }

        async function uploadMedia() {
            const input = document.createElement("input");
            input.type = "file";
            input.accept = "video/*";

            input.onchange = async () => {
                const file = input.files[0];
                if (!file) return;

                const formData = new FormData();
                formData.append("file", file);

                // Show basic loading state
                const btn = document.querySelector(".upload-btn");
                const originalText = btn.innerHTML;
                btn.innerHTML = "Uploading...";
                btn.disabled = true;

                try {
                    const res = await fetch("/api/upload_media", {
                        method: "POST",
                        body: formData
                    });

                    if (res.ok) {
                        alert("Upload successful!");
                        location.reload();
                    } else {
                        alert("Upload failed. Please check server logs.");
                    }
                } catch (err) {
                    alert("An error occurred during upload.");
                } finally {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            };

            input.click();
        }

        // Close player on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closePlayer();
        });
    </script>

</body>
</html>
